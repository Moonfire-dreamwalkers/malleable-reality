<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ff1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a0000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="eyeOverlay" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.6" />
      <stop offset="80%" style="stop-color:#000;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Glow / Background -->
  <circle cx="256" cy="256" r="230" fill="rgba(138,0,0,0.2)" filter="url(#glow)" />
  <!-- Main Eye Ball -->
  <circle cx="256" cy="256" r="240" fill="url(#eyeGradient)" stroke="#000" stroke-width="8" />
  <!-- Atmospheric Overlay (The horizontal slit feel from CSS) -->
  <ellipse cx="256" cy="256" rx="250" ry="100" fill="url(#eyeOverlay)" />
  <!-- Pupil -->
  <ellipse cx="256" cy="256" rx="55" ry="150" fill="#000" />
  <!-- Subtle Highlight -->
  <circle cx="200" cy="200" r="15" fill="rgba(255,255,255,0.15)" />
</svg>
