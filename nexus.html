<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inconsolata:wght@400;700&display=swap"

    <style>
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: var(--mr-void-1);
            font-family: var(--mr-font-family);
            color: var(--mr-text-main);
        }

        .nexus-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1.5rem 2rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        /* Navigation */
        .nexus-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .exit-link {
            color: var(--mr-text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .exit-link:hover {
            color: var(--mr-purple);
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: var(--mr-font-data);
            font-size: 0.75rem;
            color: var(--mr-purple);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--mr-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--mr-purple);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Holographic Terminal UI */
        .terminal-container {
            flex-grow: 1;
            background: rgba(10, 2, 15, 0.5);
            border: 1px solid rgba(92, 24, 168, 0.25);
            border-radius: var(--mr-border-radius);
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(92, 24, 168, 0.05);
            margin-bottom: 1.5rem;
            min-height: 0;
        }

        .terminal-header {
            padding: 0.9rem 2rem;
            background: rgba(20, 5, 35, 0.7);
            border-bottom: 1px solid rgba(92, 24, 168, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        /* Chat History */
        #chat-history {
            flex-grow: 1;
            padding: 1.5rem 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scrollbar-width: thin;
            scrollbar-color: var(--mr-purple) transparent;
            min-height: 0;
        }

        #chat-history::-webkit-scrollbar {
            width: 4px;
        }

        #chat-history::-webkit-scrollbar-thumb {
            background: var(--mr-purple);
            border-radius: 10px;
        }

        .message {
            max-width: 82%;
            padding: 1.1rem 1.5rem;
            border-radius: 18px;
            line-height: 1.65;
            font-size: 1rem;
            position: relative;
            animation: slide-up 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(92, 24, 168, 0.1);
            border: 1px solid rgba(92, 24, 168, 0.22);
            color: var(--mr-text-main);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(255, 204, 0, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.2);
            color: var(--mr-accent);
            border-bottom-right-radius: 4px;
        }

        .message .sender {
            display: block;
            font-family: var(--mr-font-data);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.45rem;
            opacity: 0.55;
        }

        /* Suggestion chips */
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .chip {
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            border: 1px solid rgba(92, 24, 168, 0.4);
            color: rgba(200, 170, 255, 0.85);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            background: rgba(92, 24, 168, 0.08);
            font-family: inherit;
        }

        .chip:hover {
            background: rgba(92, 24, 168, 0.22);
            border-color: var(--mr-purple);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Module link cards inside messages */
        .module-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: rgba(180, 140, 255, 0.9);
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(92, 24, 168, 0.4);
            transition: all 0.2s;
            padding-bottom: 1px;
        }

        .module-link:hover {
            color: #fff;
            border-bottom-color: var(--mr-purple);
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 1rem;
            flex-shrink: 0;
        }

        #user-input {
            flex-grow: 1;
            background: rgba(10, 2, 15, 0.7);
            border: 1px solid rgba(92, 24, 168, 0.3);
            border-radius: 30px;
            padding: 1.1rem 1.75rem;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        #user-input:focus {
            border-color: var(--mr-purple);
            box-shadow: 0 8px 25px rgba(92, 24, 168, 0.2), 0 0 15px rgba(92, 24, 168, 0.1);
        }

        .send-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--mr-purple);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: var(--mr-glow-purple);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(8deg);
            box-shadow: 0 0 35px var(--mr-purple);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Typing/synthesis indicator */
        .synthesis-indicator {
            display: none;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 2rem 0;
            font-family: var(--mr-font-data);
            font-size: 0.78rem;
            color: rgba(150, 100, 220, 0.7);
            flex-shrink: 0;
        }

        .synthesis-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--mr-purple);
            border-radius: 50%;
            animation: bounce-dot 1.2s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce-dot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
    </style>
</head>

            organization: {
                patterns: ['organization', 'who are they', 'who made this', 'seraphim', 'shadowland', 'community', 'group', 'collective', 'members', 'join', 'who runs this', 'luna', 'creator', 'author'],
                response: () => `The organization behind Malleable Reality is a collective of observers — people who've decentralized their identity to protect the quality of the signal they operate from. There are two wings you can explore: <a href="org-seraphim.html" class="module-link">Seraphim</a> and <a href="org-shadowland.html" class="module-link">Shadowland</a>. The Shadowland is described as a high-frequency coordinate — a space for those operating beyond the standard pulse. Membership isn't about credentials; it's about coherence and alignment.`,
                chips: ['What is alignment?', 'What is frequency?', 'Tell me about the signal you broadcast', 'What is the invisible gate?']
            },

            // APPS / NEXUS
            apps: {
                patterns: ['app', 'apps', 'tools', 'quiz', 'crossword', 'games', 'interactive', 'what else can i do', 'features'],
                response: () => `Beyond the modules, there's an apps section with interactive tools — including a conceptual quiz and a crossword puzzle built around the site's ideas. You're already talking to Nexus, which is one of them. Check out <a href="apps.html" class="module-link">the apps page</a> for the full list.`,
                chips: ['Tell me about the modules', 'What is this site about?', 'What is the observer?']
            },

            // MUSIC / MUSIC ALCHEMY
            music: {
                patterns: ['music', 'music alchemy', 'sound', 'frequency music', 'songs', 'artists', 'harmonic', 'transmute'],
                response: () => `Music Alchemy refers to the practice of using specific sonic frequencies — through curated music — to transmute and align internal states. It's treated as a functional tool, not just entertainment. The idea is that music bypasses the rational filter and directly modulates the internal environment. There's a dedicated <a href="music-alchemy.html" class="module-link">Music Alchemy page</a> that explores this in detail with specific recommendations.`,
                chips: ['What is the internal environment?', 'Tell me about spiritual alchemy', 'What is frequency?']
            },

            // SIMULATION / REALITY
            simulation: {
                patterns: ['simulation', 'matrix', 'real', 'is this real', 'simulated', 'virtual', 'program', 'code', 'illusion', 'maya', 'dream', 'is reality real'],
                response: () => `Whether reality is a simulation is arguably the wrong question. What the Malleable Reality framework points to is that reality operates like a simulation in functional terms — meaning it responds to the observer, it's built on patterned information, and it self-corrects around coherence. Whether that makes it "fake" or not is less interesting than the practical implication: you're not a passive recipient of a fixed reality. You're an active participant in how it renders. The collective perception conjures the matrix upon which everything emerges.`,
                chips: ['What is the unified field?', 'What is quantum immortality?', 'Tell me about the cosmic organism', 'What is the observer?']
            },

            // CONFUSED / LOST VISITOR
            confused: {
                patterns: ['i don\'t understand', "i don't get it", 'what does this mean', 'confused', 'lost', 'strange', 'weird', 'too abstract', 'explain simply', 'simple', 'basic', 'beginner', 'new here', 'what is going on', 'makes no sense', 'huh', 'um', 'ok'],
                response: () => `That's a fair place to start. The concepts here can sound abstract at first. Here's the simplest version: this site is about the idea that who you are and how you experience reality isn't fixed — it's shaped by your beliefs, your focus, and your internal state. And that you have more influence over all of that than you've been told. The learning modules break this into digestible topics — identity, perception, discipline, the way people read you. Which of those sounds most relevant to where you are right now?`,
                chips: ['Identity sounds interesting', 'Tell me about discipline', 'I\'m curious about the observer', 'How does it all connect?']
            },

            // PHILOSOPHY / RELATED TRADITIONS
            philosophy: {
                patterns: ['philosophy', 'stoic', 'buddhism', 'zen', 'taoism', 'jung', 'freud', 'plato', 'nietzsche', 'psychology', 'metaphysics', 'spiritual', 'religion', 'god', 'divine', 'higher power', 'source', 'creator'],
                response: () => `The Malleable Reality framework doesn't align with any single tradition, but it draws on many: observer-consciousness from Eastern philosophy, the Jungian idea of shadow integration, quantum theories of consciousness, and practical frameworks from performance psychology and behavioral design. Where it differs: it's not purely spiritual or purely scientific — it treats the metaphysical and mechanical as the same system viewed through different lenses. God is described here as "the force that pushes reality into rational transitions of scaling awareness." Make of that what you will.`,
                chips: ['What is the observer?', 'Tell me about the unified field', 'What is consciousness?', 'What are the modules?']
            },

            // CATCH-ALL / FALLBACK
            fallback: {
                patterns: [],
                response: (q) => {
                    const suggestions = [
                        'Try asking about a specific module — like identity, the observer, or discipline.',
                        'You can ask what this site is about, explore the 9 modules, or ask about concepts like frequency, the void, or free will.',
                        'If you\'re looking for a place to start, try asking: "Where should I begin?"'
                    ];
                    const pick = suggestions[state.messageCount % suggestions.length];
                    return `I'm synthesizing your query but haven't found an exact frequency match. ${pick}`;
                },
                chips: ['What is this site?', 'Show me the modules', 'What is the observer?', 'What is frequency?']
            }
        };

        // ── NLP Engine ────────────────────────────────────────────────────────────

        function normalise(str) {
            return str.toLowerCase()
                .replace(/[\u2018\u2019]/g, "'")
                .replace(/[^a-z0-9\s']/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function score(query, patterns) {
            let hits = 0;
            for (const p of patterns) {
                if (query.includes(p)) hits++;
            }
            return hits;
        }

        // Returns { key, entry } so callers can use the string key for comparisons
        function classifyWithKey(rawQuery) {
            const q = normalise(rawQuery);

            // Check for "where do i start" / general guidance
            if (/where (do i|should i) (start|begin)|getting started|first step|what first/i.test(rawQuery)) {
                return { key: 'siteOverview', entry: KB.siteOverview };
            }

            // Score every category
            const candidates = Object.entries(KB).map(([key, entry]) => ({
                key,
                entry,
                score: score(q, entry.patterns || [])
            }));

            candidates.sort((a, b) => b.score - a.score);

            const best = candidates[0];

            // Need at least one hit
            if (best.score === 0) return { key: 'fallback', entry: KB.fallback };

            // Tiebreaker: prefer more specific categories
            const tied = candidates.filter(c => c.score === best.score && c.key !== 'fallback');
            if (tied.length > 1) {
                // prefer concept-heavy ones over siteOverview/greeting
                const weights = { greeting: -2, siteOverview: -1 };
                tied.sort((a, b) => (weights[b.key] || 0) - (weights[a.key] || 0));
                return { key: tied[0].key, entry: tied[0].entry };
            }

            return { key: best.key, entry: best.entry };
        }

        // ── UI Helpers ────────────────────────────────────────────────────────────

        function addMessage(sender, htmlContent, type, chips = []) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = `<span class="sender">${sender}</span>${htmlContent}`;

            if (chips.length) {
                const chipRow = document.createElement('div');
                chipRow.className = 'suggestion-chips';
                chips.forEach(text => {
                    const btn = document.createElement('button');
                    btn.className = 'chip';
                    btn.textContent = text;
                    btn.addEventListener('click', () => {
                        userInput.value = text;
                        if (nexusForm.requestSubmit) {
                            nexusForm.requestSubmit();
                        } else {
                            nexusForm.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
                        }
                    });
                    chipRow.appendChild(btn);
                });
                msg.appendChild(chipRow);
            }

            chatHistory.appendChild(msg);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return msg;
        }

        function showTyping() {
            synthesis.classList.add('active');
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function hideTyping() {
            synthesis.classList.remove('active');
        }

        // ── Response generation ────────────────────────────────────────────────────

        function generateResponse(rawQuery) {
            state.messageCount++;

            const { key: categoryKey, entry: category } = classifyWithKey(rawQuery);
            let responseText = typeof category.response === 'function'
                ? category.response(rawQuery)
                : category.response;

            // Append a connective phrase if we've been chatting a while
            const skipBridge = ['fallback', 'modulesOverview', 'greeting'].includes(categoryKey);
            if (state.messageCount > 3 && !skipBridge) {
                const bridges = [
                    ' What else surfaces for you?',
                    ' Does this resonate with something you\'re working through?',
                    ' What direction do you want to take this?'
                ];
                if (Math.random() > 0.5) {
                    responseText += bridges[state.messageCount % bridges.length];
                }
            }

            // Track topics for context
            state.lastTopics.push(categoryKey);
            if (state.lastTopics.length > 5) state.lastTopics.shift();

            const chips = category.chips || [];
            hideTyping();
            addMessage('Nexus', responseText, 'ai', chips);
        }

        // ── Form submit ───────────────────────────────────────────────────────────

        nexusForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('You', text, 'user');
            userInput.value = '';

            showTyping();

            const delay = 900 + Math.random() * 900;
            setTimeout(() => generateResponse(text), delay);
        });

        // ── Initial message ───────────────────────────────────────────────────────
        (function init() {
            const openers = [
                `I'm Nexus. I can guide you through the Malleable Reality framework — the modules, the concepts, or the ideas behind it all. What brings you here?`,
                `Nexus online. This space exists at the intersection of consciousness, philosophy, and deliberate self-architecture. Ask me anything — or tell me where your curiosity lands.`,
                `Signal established. I have access to the full Malleable Reality knowledge base — 9 learning modules and the framework beneath them. Where do you want to go?`
            ];
            const picked = openers[Math.floor(Math.random() * openers.length)];
            addMessage('Nexus', picked, 'ai', ['What is this site?', 'Show me the modules', 'What is the observer?', 'Where do I start?']);
        })();

    </script>
