                throw new Error(err?.error?.message || `HTTP ${res.status}`);
            }

            const data = await res.json();
            const reply = data?.choices?.[0]?.message?.content;
            if (!reply) throw new Error('Empty response from Groq');

            // Add assistant turn to history
            history.push({ role: 'assistant', content: reply });

            return reply;
        }

        // ─────────────────────────────────────────────────────────────────────────────
        // Submit handler
        // ─────────────────────────────────────────────────────────────────────────────
        formEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isThinking) return;
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage('You', text.replace(/</g, '&lt;'), 'user');
            inputEl.value = '';
            setThinking(true);

            if (!hasKey) {
                // Offline fallback mode
                await new Promise(r => setTimeout(r, 700 + Math.random() * 600));
                const fb = fallbackResponse(text);
                setThinking(false);
                addMessage('Nexus', fb.text.replace(/\n/g, '<br>'), 'ai', fb.chips || []);
                return;
            }

            try {
                const reply = await callGroq(text);
                setThinking(false);
                addMessage('Nexus', mdToHtml(reply), 'ai');
            } catch (err) {
                setThinking(false);
                addMessage('Nexus', `Signal disruption detected: <em>${err.message}</em>. Check your API key or network connection.`, 'error');
                console.error('Groq error:', err);
            }
        });

        // ─────────────────────────────────────────────────────────────────────────────
        // Init
        // ─────────────────────────────────────────────────────────────────────────────
        (function init() {
            if (!hasKey) {
                banner.classList.remove('hidden');
                statusLbl.textContent = 'OFFLINE MODE';
            }

            const openers = [
                `I'm Nexus. I have full access to the Malleable Reality framework — the concepts, the modules, and the ideas beneath them. What brings you here?`,
                `Nexus online. This space sits at the intersection of consciousness, identity, and deliberate self-architecture. Ask me anything.`,
                `Signal established. Whether you're completely new to this or already deep in it — I can meet you where you are. What's on your mind?`
            ];
            const opener = openers[Math.floor(Math.random() * openers.length)];
            addMessage('Nexus', opener, 'ai', ['What is this site?', 'Show me the modules', 'What is the observer?', 'Where do I start?']);
        })();
    </script>

</body>
